name: Bootstrap State Backend

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "bootstrap" to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  bootstrap:
    name: Create S3 Bucket and DynamoDB Table
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'bootstrap'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::636603298497:role/GitHubActionsRole
          aws-region: ca-central-1

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.0

      - name: Create bootstrap configuration
        run: |
          mkdir -p tofu/bootstrap
          cat > tofu/bootstrap/main.tf <<'EOF'
          terraform {
            required_version = ">= 1.6.0"
            required_providers {
              aws = {
                source  = "hashicorp/aws"
                version = "~> 5.0"
              }
            }
          }

          provider "aws" {
            region = "ca-central-1"
            default_tags {
              tags = {
                Project     = "chew-site"
                ManagedBy   = "opentofu"
                Environment = "bootstrap"
              }
            }
          }

          # S3 bucket for storing OpenTofu state
          resource "aws_s3_bucket" "tfstate" {
            bucket = "chew-site-tfstate"

            lifecycle {
              prevent_destroy = true
            }

            tags = {
              Name        = "OpenTofu State Bucket"
              Description = "Stores OpenTofu state files for chew-site infrastructure"
            }
          }

          # Enable versioning for state history
          resource "aws_s3_bucket_versioning" "tfstate" {
            bucket = aws_s3_bucket.tfstate.id

            versioning_configuration {
              status = "Enabled"
            }
          }

          # Enable server-side encryption
          resource "aws_s3_bucket_server_side_encryption_configuration" "tfstate" {
            bucket = aws_s3_bucket.tfstate.id

            rule {
              apply_server_side_encryption_by_default {
                sse_algorithm = "AES256"
              }
            }
          }

          # Block all public access
          resource "aws_s3_bucket_public_access_block" "tfstate" {
            bucket = aws_s3_bucket.tfstate.id

            block_public_acls       = true
            block_public_policy     = true
            ignore_public_acls      = true
            restrict_public_buckets = true
          }

          # DynamoDB table for state locking
          resource "aws_dynamodb_table" "tfstate_lock" {
            name         = "chew-site-tfstate-lock"
            billing_mode = "PAY_PER_REQUEST"
            hash_key     = "LockID"

            attribute {
              name = "LockID"
              type = "S"
            }

            lifecycle {
              prevent_destroy = true
            }

            tags = {
              Name        = "OpenTofu State Lock Table"
              Description = "Prevents concurrent modifications to OpenTofu state"
            }
          }

          output "bucket_name" {
            description = "Name of the S3 bucket for state storage"
            value       = aws_s3_bucket.tfstate.id
          }

          output "dynamodb_table_name" {
            description = "Name of the DynamoDB table for state locking"
            value       = aws_dynamodb_table.tfstate_lock.id
          }

          output "bucket_arn" {
            description = "ARN of the S3 bucket"
            value       = aws_s3_bucket.tfstate.arn
          }
          EOF

      - name: Initialize OpenTofu
        run: |
          cd tofu/bootstrap
          tofu init

      - name: Plan bootstrap infrastructure
        run: |
          cd tofu/bootstrap
          tofu plan

      - name: Apply bootstrap infrastructure
        run: |
          cd tofu/bootstrap
          tofu apply -auto-approve

      - name: Show outputs
        run: |
          cd tofu/bootstrap
          tofu output

      - name: Upload bootstrap state as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-state
          path: tofu/bootstrap/terraform.tfstate
          retention-days: 90

      - name: Bootstrap complete
        run: |
          echo "✅ Bootstrap complete!"
          echo ""
          echo "State backend resources created:"
          echo "  - S3 Bucket: chew-site-tfstate"
          echo "  - DynamoDB Table: chew-site-tfstate-lock"
          echo ""
          echo "Next steps:"
          echo "  1. Configure backend in tofu/environments/*/backend.tf"
          echo "  2. Run 'tofu init' in each environment to migrate to remote state"
          echo "  3. This workflow only needs to run once"
