name: Plan Infrastructure

on:
  pull_request:
    branches:
      - main
    paths:
      - 'tofu/**'
      - '.github/workflows/plan.yml'

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.0

      - name: Format check
        run: |
          if [ -d "tofu" ]; then
            tofu fmt -check -recursive tofu/
          fi

      - name: Validate configurations
        run: |
          for env in tofu/environments/*/; do
            if [ -d "$env" ]; then
              echo "Validating $(basename $env)..."
              cd "$env" && tofu init -backend=false && tofu validate && cd -
            fi
          done

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Run TFLint
        run: |
          if [ -d "tofu" ]; then
            cd tofu
            tflint --init
            tflint --chdir=.
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: tofu
          soft_fail: true

  plan-dev:
    name: Plan Dev
    runs-on: ubuntu-latest
    needs: [validate, lint, security]
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::636603298497:role/GitHubActionsRole
          aws-region: ca-central-1

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.0

      - name: Initialize Dev
        run: |
          if [ -d "tofu/environments/dev" ]; then
            cd tofu/environments/dev
            tofu init
          fi

      - name: Plan Dev
        id: plan-dev
        run: |
          if [ -d "tofu/environments/dev" ]; then
            cd tofu/environments/dev
            tofu plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
            echo "plan_output<<EOF" >> $GITHUB_OUTPUT
            cat plan-output.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Comment PR with Dev plan
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### 🏗️ Infrastructure Plan: Dev Environment

            #### OpenTofu Format and Style 🖌 \`${{ steps.plan-dev.outcome }}\`
            #### OpenTofu Initialization ⚙️ \`${{ steps.plan-dev.outcome }}\`
            #### OpenTofu Plan 📖 \`${{ steps.plan-dev.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan-dev.outputs.plan_output }}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  plan-prod:
    name: Plan Prod
    runs-on: ubuntu-latest
    needs: [validate, lint, security]
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::636603298497:role/GitHubActionsRole
          aws-region: ca-central-1

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.6.0

      - name: Initialize Prod
        run: |
          if [ -d "tofu/environments/prod" ]; then
            cd tofu/environments/prod
            tofu init
          fi

      - name: Plan Prod
        id: plan-prod
        run: |
          if [ -d "tofu/environments/prod" ]; then
            cd tofu/environments/prod
            tofu plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
            echo "plan_output<<EOF" >> $GITHUB_OUTPUT
            cat plan-output.txt >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Comment PR with Prod plan
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### 🚀 Infrastructure Plan: Prod Environment

            #### OpenTofu Format and Style 🖌 \`${{ steps.plan-prod.outcome }}\`
            #### OpenTofu Initialization ⚙️ \`${{ steps.plan-prod.outcome }}\`
            #### OpenTofu Plan 📖 \`${{ steps.plan-prod.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan-prod.outputs.plan_output }}
            \`\`\`

            </details>

            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
